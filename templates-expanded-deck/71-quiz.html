<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>71 · Quiz · checagem</title>
<link rel="stylesheet" href="style.css?v=5.2" />
<style>
  /* Quiz dark — checagem rápida com resposta revelada.
     ESQUERDA: x 96 → 840 (744px), coluna centrada verticalmente entre
       top 170 e bottom 132 (mesma faixa 170→768 da pilha de cards →
       centros ópticos alinhados em y 469); pergunta serif 44px, max-width 640px.
     DIREITA: left 900 · width 604 → 900 + 604 = 1504 = 1600 − 96 ✓
       calha entre colunas: 900 − 840 = 60px.
       4 alternativas: 4 × 136px + 3 × 18px de gap = 598px;
       top 170 → termina em y 768 (dentro do limite 790 da faixa ✓).
     Rodapé mono: left 96 · bottom 96 → base em y 804 ✓. */

  .ask{position:absolute;left:var(--pad);top:170px;bottom:132px;width:744px;
    display:flex;flex-direction:column;justify-content:center}
  .ask .eyebrow{margin-bottom:24px}
  .ask h1{font-size:44px;line-height:1.18;max-width:640px}
  .ask .note{margin-top:26px;color:var(--text-3)}

  .alts{position:absolute;left:900px;width:604px;top:170px;
    display:flex;flex-direction:column;gap:18px}

  .alt{height:136px;display:flex;align-items:center;gap:24px;padding:0 32px}
  .alt .disc{flex:0 0 40px;width:40px;height:40px;border-radius:50%;
    background:var(--surface-2);border:1px solid var(--border);
    display:grid;place-items:center;
    font-family:var(--mono);font-size:15px;font-weight:500;
    letter-spacing:.04em;color:var(--text-2)}
  .alt .txt{font-size:17px;line-height:1.45;color:var(--text-2)}

  /* alternativa correta: única superfície gold do slide */
  .alt--key .disc{background:linear-gradient(180deg,var(--gold-300),var(--gold-500));
    border-color:var(--gold-border);color:var(--on-gold)}
  .alt--key .txt{color:var(--text-1)}
  .alt--key .chip{margin-left:auto;flex:none}

  .foot{position:absolute;left:var(--pad);bottom:96px}
</style>
</head>
<body>
<!-- copy = Lorem Ipsum calibrado ao layout · troque pelo seu conteúdo mantendo comprimentos -->
<div class="stage">
  <article class="slide mode-dark" data-section="Lorem · ipsum">

    <div class="ask">
      <div class="eyebrow">Lorem ipsum sit</div>
      <!-- sem <em> gold no título: o único protagonista gold do slide é a alternativa B -->
      <h1 class="h-serif">Lorem ipsum dolor sit amet consectetur adipiscing elit sed do eiusmod tempor?</h1>
      <p class="small note">Consectetur adipiscing elit sed do tempor.</p>
    </div>

    <section class="alts">
      <div class="alt surface surface--flat">
        <span class="disc">A</span>
        <p class="body txt">Lorem ipsum</p>
      </div>

      <div class="alt alt--key surface surface--gold">
        <span class="disc">B</span>
        <p class="body txt">Consectetur adipiscing</p>
        <span class="chip chip--gold"><span class="dot"></span>deserunt</span>
      </div>

      <div class="alt surface surface--flat">
        <span class="disc">C</span>
        <p class="body txt">Tempor incididunt</p>
      </div>

      <div class="alt surface surface--flat">
        <span class="disc">D</span>
        <p class="body txt">Ullamco nostrud</p>
      </div>
    </section>

    <div class="mono-label foot">lorem: consectetur adipiscing 240 sed · Amet · 2025</div>

  </article>
</div>
<script>
  const slide = document.querySelector('.slide');
  function fit(){
    const s = Math.min(innerWidth / 1600, innerHeight / 900);
    slide.style.transform = `translate(-50%, -50%) scale(${s})`;
  }
  addEventListener('resize', fit); fit();
</script>
</body>
</html>
