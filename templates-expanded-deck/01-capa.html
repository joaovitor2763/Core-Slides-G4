<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>01 · Capa</title>
<link rel="stylesheet" href="style.css?v=5.2" />
<style>
  /* Capa dark: anéis orbitais + grain + serif hero com itálico gold.
     Assimétrica: bloco de título ancorado à esquerda, órbita sangrando
     à direita, rodapé com meta em chips. */

  .armilar--corner{width:780px;height:439px;right:-30px;bottom:-30px;opacity:.26}

  .brand{position:absolute;left:var(--pad);top:76px;display:flex;align-items:center;gap:16px}
  .brand .divider{width:1px;height:22px;background:var(--border-2)}
  .brand .prog{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-3)}

  .hero{position:absolute;left:var(--pad);bottom:240px;max-width:1080px}
  .hero .eyebrow{margin-bottom:30px}
  .hero h1{font-size:104px}
  .hero .sub{margin-top:34px;max-width:640px}

  .meta{position:absolute;left:var(--pad);right:var(--pad);bottom:84px;
    display:flex;align-items:center;gap:14px;padding-top:28px;
    border-top:1px solid var(--border)}
  .meta .spacer{margin-left:auto}
  .meta .date{font-family:var(--mono);font-size:11.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-3)}
</style>
</head>
<body>
<!-- copy = Lorem Ipsum calibrado ao layout · troque pelo seu conteúdo mantendo comprimentos -->
<div class="stage">
  <article class="slide mode-dark" data-section="Lorem · ipsum">

    <div class="armilar armilar--engraving armilar--corner" aria-hidden="true"></div>
    <div class="grain" aria-hidden="true"></div>

    <header class="brand">
      <img class="logo" src="assets/g4-logo-branca.svg" alt="G4 Educação">
      <span class="divider" aria-hidden="true"></span>
      <span class="prog">Lorem · ipsum sit dolor</span>
    </header>

    <div class="hero">
      <div class="eyebrow">Lorem ipsum sit</div>
      <h1 class="h-serif">Dolor sit amet<br>commodo <em>sed tempor.</em></h1>
      <p class="lede sub">Lorem ipsum dolor sit amet consectetur adipiscing elit sed tempor incididunt labore — magna aliqua, veniam quis nostrud ullamco.</p>
    </div>

    <footer class="meta">
      <span class="chip chip--gold"><span class="dot"></span>Lorem 07</span>
      <span class="chip">Dolor sit · adipiscing</span>
      <span class="spacer"></span>
      <span class="date">Julho · 2026</span>
    </footer>

  </article>
</div>
<script>
  const slide = document.querySelector('.slide');
  function fit(){
    const s = Math.min(innerWidth / 1600, innerHeight / 900);
    slide.style.transform = `translate(-50%, -50%) scale(${s})`;
  }
  addEventListener('resize', fit); fit();
</script>
</body>
</html>
