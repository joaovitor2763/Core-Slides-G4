<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>25 · Hero com logo G4 (dark)</title>
<link rel="stylesheet" href="style.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&display=swap" rel="stylesheet">
<style>
  /* ---- Capa G4 Gestão e Estratégia ---- */
  .capa {
    font-family: var(--f-text);
    color: var(--fg);
  }

  /* HEADER — logo + linha + tag */
  .capa-header {
    position: absolute;
    top: 56px;
    left: 96px;
    right: 96px;
    display: flex;
    align-items: center;
    gap: 32px;
    z-index: 5;
  }
  .capa-header .logo-g4 {
    height: 32px;
    width: auto;
    display: block;
  }
  .capa-header .hairline {
    flex: 1;
    height: 1px;
    background: var(--accent);
    opacity: 0.55;
  }
  .capa-header .tag {
    font-family: var(--f-mono);
    font-size: 13px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--fg-2);
    font-weight: 500;
    white-space: nowrap;
  }

  /* SÍMBOLO G4 — overlay full-screen em low opacity */
  .capa-overlay {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.14;
    pointer-events: none;
    z-index: 1;
  }

  /* ESCUDO — canto inferior direito, maior e mais visível */
  .capa-shield {
    position: absolute;
    right: -60px;
    bottom: -60px;
    width: 980px;
    height: auto;
    opacity: 0.9;
    pointer-events: none;
    z-index: 2;
  }

  /* BLOCO DE CONTEÚDO — centralizado verticalmente com respiro */
  .capa-block {
    position: absolute;
    left: 96px;
    right: 96px;
    top: 200px;
    bottom: 200px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    z-index: 4;
  }

  /* TÍTULO serif */
  .capa-title {
    font-family: 'Cormorant Garamond', 'Times New Roman', serif;
    font-weight: 500;
    color: var(--accent);
    line-height: 0.95;
    letter-spacing: -0.01em;
    margin: 0;
  }
  .capa-title .line-1 {
    display: block;
    font-size: 132px;
    font-weight: 600;
  }
  .capa-title .line-2 {
    display: block;
    font-size: 132px;
    font-style: italic;
    font-weight: 500;
  }
  .capa-title .dot {
    color: var(--accent);
  }

  /* SUBTÍTULO */
  .capa-sub {
    margin-top: 48px;
    font-family: 'Cormorant Garamond', 'Times New Roman', serif;
    font-size: 28px;
    line-height: 1.4;
    color: var(--fg-2);
    max-width: 580px;
    font-weight: 400;
  }
  .capa-sub b { font-weight: 600; color: var(--fg); }

  /* BARRA dourada inferior */
  .capa-bar {
    position: absolute;
    left: 0;
    bottom: 0;
    width: 760px;
    height: 32px;
    background: var(--accent);
    z-index: 3;
  }

  /* FOOTER — só G4 + ano (sem Mentor / nome) */
  .capa-foot {
    position: absolute;
    left: 96px;
    bottom: 64px;
    right: 96px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: var(--f-mono);
    font-size: 13px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
    z-index: 5;
  }
  .capa-foot .left { color: var(--fg-2); font-weight: 500; }
</style>
</head>
<body>
<div class="stage">
  <article class="slide mode-dark capa" data-section="">

    <!-- BACKGROUND OVERLAY: símbolo G4 full-screen em low opacity -->
    <img class="capa-overlay" src="assets/pattern-symbol.png" alt="" aria-hidden="true" />

    <!-- HEADER -->
    <header class="capa-header">
      <img class="logo-g4" src="assets/g4-logo-branca.svg" alt="G4" />
      <div class="hairline"></div>
      <div class="tag">Para quem quer mais</div>
    </header>

    <!-- ESCUDO canto inferior direito -->
    <img class="capa-shield" src="assets/pattern-shield.png" alt="" aria-hidden="true" />

    <!-- CONTEÚDO principal -->
    <div class="capa-block">
      <h1 class="capa-title">
        <span class="line-1">G4 Gestão</span>
        <span class="line-2">e Estratégia<span class="dot">.</span></span>
      </h1>
      <p class="capa-sub">
        <b>Estrutura e estratégia</b><br>
        com clareza para negócios<br>
        de <b>crescimento acelerado</b>.
      </p>
    </div>

    <!-- BARRA dourada inferior -->
    <div class="capa-bar"></div>

    <!-- FOOTER -->
    <footer class="capa-foot">
      <span></span>
      <span>2026</span>
    </footer>

  </article>
</div>
<script>
  const slide = document.querySelector('.slide');
  function fit(){
    const sx = window.innerWidth  / 1600;
    const sy = window.innerHeight / 900;
    const s  = Math.min(sx, sy);
    slide.style.transform = `translate(-50%, -50%) scale(${s})`;
  }
  fit();
  window.addEventListener('resize', fit);
</script>
</body>
</html>
