<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>42 · Quote tweet (dark)</title>
<link rel="stylesheet" href="style.css" />
<style>
  /* ============================================================
     Slide 42 — Quote tweet / post reproduzido
     Bloco central-esquerdo emoldurado por hairlines (sem sombra)
     reproduz um post de LinkedIn/X; coluna estreita à direita
     traz o contexto editorial de por que o post importa.
     Único accent: 1 palavra em <em> no comentário à direita.
     ============================================================ */

  /* --- o post emoldurado --- */
  .post {
    position: absolute;
    left: var(--pad);
    top: 50%;
    transform: translateY(-50%);
    width: 900px;                      /* 96 + 900 = 996 < 1076 (início da coluna) */
    border: 1px solid var(--hairline); /* moldura hairline, SEM sombra */
    background: var(--bg);
    padding: 56px 64px 48px;
  }

  .post-author {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 36px;
  }

  /* avatar placeholder circular 56px com silhueta SVG (padrão do template 03) */
  .avatar {
    width: 56px; height: 56px;
    border-radius: 50%;                /* funcional: avatar circular, não decorativo */
    background: #1a1a1a;
    position: relative;
    overflow: hidden;
    flex: none;
  }
  .avatar::after {
    content: "";
    position: absolute; inset: 0;
    background: repeating-linear-gradient(-45deg, transparent 0 12px, rgba(255,255,255,0.05) 12px 13px);
  }
  .avatar svg { position: absolute; inset: 0; margin: auto; opacity: 0.4; }

  .author-name {
    font-family: var(--f-text);
    font-size: 19px;
    font-weight: 600;
    color: var(--fg);
    line-height: 1.2;
  }
  .author-handle {
    font-family: var(--f-mono);
    font-size: 13px;
    letter-spacing: 0.06em;
    color: var(--fg-muted);
    margin-top: 4px;
  }

  .post-text {
    font-family: var(--f-text);
    font-weight: 400;
    font-size: 32px;
    line-height: 1.4;
    color: var(--fg);
    letter-spacing: -0.005em;
  }
  .post-text em { font-style: italic; font-weight: 500; }

  .post-meta {
    margin-top: 40px;
    padding-top: 22px;
    border-top: 1px solid var(--hairline);
    font-family: var(--f-mono);
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--fg-muted);
  }

  /* --- coluna de contexto editorial à direita --- */
  .context {
    position: absolute;
    left: 1076px;
    right: var(--pad);                 /* largura = 1504 − 1076 = 428px */
    top: 50%;
    transform: translateY(-50%);
  }
  .context .eyebrow { margin-bottom: 28px; }
  .context-note {
    font-family: var(--f-text);
    font-size: 20px;
    line-height: 1.55;
    color: var(--fg-2);
  }
  /* o único accent do slide: 1 palavra em italic */
  .context-note em {
    font-style: italic;
    font-weight: 500;
    color: var(--accent);
  }
  .context-sub {
    margin-top: 28px;
    font-family: var(--f-mono);
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--fg-muted);
    line-height: 1.7;
  }
</style>
</head>
<body>
<div class="stage">
  <article class="slide mode-dark" data-section="Sinal de mercado">

    <!-- post reproduzido -->
    <figure class="post">
      <div class="post-author">
        <div class="avatar" aria-hidden="true">
          <svg viewBox="0 0 100 100" width="34" height="34">
            <circle cx="50" cy="36" r="16" fill="none" stroke="white" stroke-width="4"/>
            <path d="M22 86 C22 62, 78 62, 78 86" fill="none" stroke="white" stroke-width="4"/>
          </svg>
        </div>
        <div>
          <div class="author-name">Rafael Menezes</div>
          <div class="author-handle">@rafamenezes · founder, SaaS série B</div>
        </div>
      </div>

      <blockquote class="post-text">
        Passamos 6 meses ensinando o time a escrever prompts melhores. Errado. O certo era gastar 6 <em>dias</em> transformando os 3 processos mais repetitivos em skills. Ferramenta não muda cultura — processo muda.
      </blockquote>

      <figcaption class="post-meta">14 mai 2026 &nbsp;·&nbsp; LinkedIn &nbsp;·&nbsp; 4.2k reações</figcaption>
    </figure>

    <!-- contexto editorial -->
    <aside class="context">
      <div class="eyebrow">Por que importa</div>
      <p class="context-note">
        O post viralizou porque inverte a ordem que a maioria das empresas segue: primeiro o <em>processo</em>, depois a ferramenta. É exatamente o desenho que vamos aplicar no exercício de hoje.
      </p>
      <div class="context-sub">Tese central<br>da aula 02</div>
    </aside>

  </article>
</div>
<script>
  // center + scale-to-fit
  const slide = document.querySelector('.slide');
  function fit(){
    const sx = window.innerWidth  / 1600;
    const sy = window.innerHeight / 900;
    const s  = Math.min(sx, sy);
    slide.style.transform = `translate(-50%, -50%) scale(${s})`;
  }
  fit();
  window.addEventListener('resize', fit);
</script>
</body>
</html>
