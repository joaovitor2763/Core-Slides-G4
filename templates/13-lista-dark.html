<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>13 · Lista numerada</title>
<link rel="stylesheet" href="style.css" />
<style>
  /* ---- Slide 13 — editorial list, 5 itens, fits 1600x900 ---- */

  .header {
    position: absolute;
    left: var(--pad);
    top: 120px;
    right: var(--pad);
  }
  .header .eyebrow { margin-bottom: 28px; }
  .header h1 {
    font-family: var(--f-display);
    font-weight: 600;
    font-size: 68px;
    line-height: 1.0;
    letter-spacing: -0.025em;
    max-width: 1180px;
  }
  .header h1 em {
    font-style: italic;
    font-weight: 500;
  }

  /* List wrapper sits below the title with breathing room.
     5 items × ~88px = ~440px; ends near y≈760, well inside the 1600×900 frame. */
  .list {
    position: absolute;
    left: var(--pad);
    right: var(--pad);
    top: 320px;
  }

  .li {
    display: grid;
    grid-template-columns: 1fr auto;
    column-gap: 64px;
    align-items: baseline;
    padding: 24px 0;
    border-top: 1px solid var(--rule);
  }
  .li:last-child { border-bottom: 1px solid var(--ink); }

  .li .t {
    font-family: var(--f-display);
    font-size: 32px;
    line-height: 1.18;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  /* Emphasis stays in family — italic + heavier weight, no color. */
  .li .t em {
    font-style: italic;
    font-weight: 600;
  }

  .li .meta {
    font-family: var(--f-mono);
    font-size: 14px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink);
    white-space: nowrap;
  }
  .li .meta .num {
    color: var(--muted);
    margin-right: 14px;
  }
  .li .meta .sep {
    color: var(--muted);
    margin-right: 14px;
  }
</style>
</head>
<body>
<div class="stage">
  <article class="slide mode-dark" data-section="O que levar">

    <header class="header">
      <div class="eyebrow">5 princípios</div>
      <h1>O que <em>fica</em> depois da aula.</h1>
    </header>

    <section class="list" aria-label="Cinco princípios">

      <div class="li">
        <div class="t">IA é <em>ferramenta</em>, não substituto.</div>
        <div class="meta"><span class="num">01</span><span class="sep">/</span>mentalidade</div>
      </div>

      <div class="li">
        <div class="t">A <em>fronteira</em> é irregular por função.</div>
        <div class="meta"><span class="num">02</span><span class="sep">/</span>estratégia</div>
      </div>

      <div class="li">
        <div class="t"><em>Skill</em> própria vale 10× o prompt.</div>
        <div class="meta"><span class="num">03</span><span class="sep">/</span>execução</div>
      </div>

      <div class="li">
        <div class="t">Comece pelo <em>back-office</em>.</div>
        <div class="meta"><span class="num">04</span><span class="sep">/</span>prioridade</div>
      </div>

      <div class="li">
        <div class="t">Mensure <em>tempo e custo</em>, não buzzwords.</div>
        <div class="meta"><span class="num">05</span><span class="sep">/</span>métrica</div>
      </div>

    </section>

  </article>
</div>
<script>
  // center + scale-to-fit
  const slide = document.querySelector('.slide');
  function fit(){
    const sx = window.innerWidth  / 1600;
    const sy = window.innerHeight / 900;
    const s  = Math.min(sx, sy);
    slide.style.transform = `translate(-50%, -50%) scale(${s})`;
  }
  fit();
  window.addEventListener('resize', fit);
</script>
</body>
</html>
