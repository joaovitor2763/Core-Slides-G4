<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>12 · Imagem + legenda</title>
<link rel="stylesheet" href="style.css" />
<style>
  .img-frame {
    position:absolute; left:var(--pad); top:120px; bottom:120px; width:62%;
    background:#1a1a1a; overflow:hidden;
  }
  .img-frame::after {
    content:""; position:absolute; inset:0;
    background:repeating-linear-gradient(0deg, transparent 0 22px, rgba(255,255,255,0.04) 22px 23px);
  }
  .img-frame .ph {
    position:absolute; inset:0; display:grid; place-items:center;
    font-family:var(--f-mono); font-size:11px; letter-spacing:0.25em; color:rgba(255,255,255,0.4);
  }
  .img-frame .ph svg { opacity:0.4; }
  .img-frame .cap {
    position:absolute; left:24px; bottom:20px;
    font-family:var(--f-mono); font-size:11px; letter-spacing:0.2em; color:rgba(255,255,255,0.55);
  }
</style>
</head>
<body>
<div class="stage">
  <article class="slide mode-dark" data-section="Caso real">

    <div class="img-frame">
      <div class="ph">
        <svg viewBox="0 0 100 100" width="120" height="120">
          <rect x="10" y="20" width="80" height="60" fill="none" stroke="white" stroke-width="1.5"/>
          <circle cx="32" cy="42" r="8" fill="white"/>
          <path d="M20 70 L40 50 L60 65 L80 45 L90 55 L90 80 L10 80 Z" fill="white"/>
        </svg>
      </div>
      <div class="cap">[ IMAGEM · 1920×1080 ]</div>
    </div>

    <div style="position:absolute; right:var(--pad); top:50%; transform:translateY(-50%); width:30%; max-width:380px;">
      <div class="eyebrow" style="margin-bottom:24px;">Demonstração</div>
      <h2 class="h-display" style="font-size:48px; line-height:1.05; font-weight:500;">
        Skill de <span class="italic">Ad Review</span>.
      </h2>
      <div class="rule--muted" style="height:1px; background:var(--ink); margin:28px 0;"></div>
      <p style="font-size:16px; line-height:1.55; color:var(--ink-2);">
        Ranking automático de candidatos via LinkedIn. Tempo caiu de <span class="b">3 dias</span> para <span class="b">11 minutos</span>.
      </p>
      <div class="mono muted" style="margin-top:32px; font-size:12px; letter-spacing:0.15em; text-transform:uppercase;">
        Caso · Cliente G4
      </div>
    </div>

  </article>
</div>
<script>
  // center + scale-to-fit
  const slide = document.querySelector('.slide');
  function fit(){
    const sx = window.innerWidth  / 1600;
    const sy = window.innerHeight / 900;
    const s  = Math.min(sx, sy);
    slide.style.transform = `translate(-50%, -50%) scale(${s})`;
  }
  fit();
  window.addEventListener('resize', fit);
</script>
</body>
</html>
