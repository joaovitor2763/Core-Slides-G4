<!doctype html>
<html lang="pt-BR"><head>
<meta charset="utf-8">
<title>16 · Encerramento</title>
<link rel="stylesheet" href="style.css?v=next1">
<style>
  /* Encerramento (dark): mesma atmosfera da capa — rings + grain —
     com quote serif grande centralizada-esquerda, atribuição mono
     e CTA pill gold acompanhado de um chip de logística. */

  .armilar--corner{width:780px;height:439px;right:-30px;bottom:-30px;opacity:.22}

  .brand{position:absolute;left:var(--pad);top:76px}

  /* quote: left 96 + width 1150 = 1246 (folga de 258px à direita) */
  .close{position:absolute;left:var(--pad);top:250px;width:1150px}
  .close blockquote{font-size:76px;line-height:1.12}
  .close .by{margin-top:36px;font-family:var(--mono);font-size:12px;
    letter-spacing:.18em;text-transform:uppercase;color:var(--text-3)}

  /* ancorado por baixo: cta (~48px) termina em 730 — folga p/ o rodapé (784) */
  .action{position:absolute;left:var(--pad);bottom:170px;display:flex;align-items:center;gap:20px}

  .foot{position:absolute;left:var(--pad);right:var(--pad);bottom:76px;
    display:flex;align-items:center;justify-content:space-between;
    padding-top:26px;border-top:1px solid var(--border);
    font-family:var(--mono);font-size:11px;letter-spacing:.16em;
    text-transform:uppercase;color:var(--text-3)}
  /* id-next-clean: fundo orgânico dispensa armilar e letra fantasma */
  .armilar,.ghost,.g-ghost,.watermark,.letter{display:none!important}
</style>
<meta id="acfifjfajpekbmhmjppnmmjgmhjkildl"><meta id="dcngeagmmhegagicpcmpinaoklddcgon"></head>
<body>
<div class="stage">
  <article class="slide mode-dark" data-next-bg="" style="background:#051D2C url('assets/bg-next-strip.png') center/cover no-repeat" data-section="">

    <div class="armilar armilar--engraving armilar--corner" aria-hidden="true"></div>
    <div class="grain" aria-hidden="true"></div>

    <header class="brand">
      <img class="logo" src="assets/g4next-logo.png" alt="G4 Next">
    </header>

    <figure class="close">
      <blockquote class="h-serif">Ninguém aqui precisa de mais uma ferramenta. Precisa de um processo que <em style="color: rgb(132, 46, 32);">sobrevive à segunda-feira.</em></blockquote>
      <figcaption class="by">Tallis Gomes · fundador, G4 Educação</figcaption>
    </figure>

    <div class="action">
      <span class="cta">Bora construir a primeira skill →</span>
      <span class="chip">15 min · ao vivo</span>
    </div>

    <footer class="foot">
      <span>g4educacao.com</span>
      <span>imersao@g4educacao.com</span>
    </footer>

  </article>
</div>
<script>
  const slide = document.querySelector('.slide');
  function fit(){
    const s = Math.min(innerWidth / 1600, innerHeight / 900);
    slide.style.transform = `translate(-50%, -50%) scale(${s})`;
  }
  addEventListener('resize', fit); fit();
</script>


</body></html>
