<!doctype html>
<html lang="pt-BR"><head>
<meta charset="utf-8">
<title>01 · Capa</title>
<link rel="stylesheet" href="style.css?v=scale2">
<style>
  /* Capa dark: anéis orbitais + grain + serif hero com itálico gold.
     Assimétrica: bloco de título ancorado à esquerda, órbita sangrando
     à direita, rodapé com meta em chips. */

  .armilar--corner{width:780px;height:439px;right:-30px;bottom:-30px;opacity:.26}

  .brand{position:absolute;left:var(--pad);top:76px;display:flex;align-items:center;gap:16px}
  .brand .divider{width:1px;height:22px;background:var(--border-2)}
  .brand .prog{font-family:var(--mono);font-size:19px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-3)}

  .hero{position:absolute;left:var(--pad);bottom:240px;max-width:1080px}
  .hero .eyebrow{margin-bottom:30px}
  .hero h1{font-size:104px}
  .hero .sub{margin-top:34px;max-width:640px}

  .meta{position:absolute;left:var(--pad);right:var(--pad);bottom:84px;
    display:flex;align-items:center;gap:14px;padding-top:28px;
    border-top:1px solid var(--border)}
  .meta .spacer{margin-left:auto}
  .meta .date{font-family:var(--mono);font-size:19px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-3)}
  /* id-next-clean: fundo orgânico dispensa armilar e letra fantasma */
  .armilar,.ghost,.g-ghost,.watermark,.letter{display:none!important}
</style>
<meta id="acfifjfajpekbmhmjppnmmjgmhjkildl"><meta id="dcngeagmmhegagicpcmpinaoklddcgon"></head>
<body>
<div class="stage">
  <article class="slide mode-dark" data-next-bg="" style="background:#1E5C80 url('assets/fringe-diag-up.png') right bottom/85% auto no-repeat" data-section="">

    <div class="armilar armilar--engraving armilar--corner" aria-hidden="true"></div>
    <div class="grain" aria-hidden="true"></div>

    <header class="brand">
      <img class="logo" src="assets/g4scale-logo-light.png" alt="G4 Scale">
      <span class="divider" aria-hidden="true"></span>
      <span class="prog">Imersão · IA na operação</span>
    </header>

    <div class="hero">
      <div class="eyebrow">Aula inaugural</div>
      <h1 class="h-serif">A empresa que<br>aprende <em>mais rápido.</em></h1>
      <p class="lede sub">Como transformar IA de experimento individual em sistema operacional do negócio — com método, governança e retorno medido.</p>
    </div>

    <footer class="meta">
      <span class="chip chip--gold"><span class="dot"></span>Turma 07</span>
      <span class="chip">São Paulo · presencial</span>
      <span class="spacer"></span>
      <span class="date">Julho · 2026</span>
    </footer>

  </article>
</div>
<script>
  const slide = document.querySelector('.slide');
  function fit(){
    const s = Math.min(innerWidth / 1600, innerHeight / 900);
    slide.style.transform = `translate(-50%, -50%) scale(${s})`;
  }
  addEventListener('resize', fit); fit();
</script>


</body></html>
