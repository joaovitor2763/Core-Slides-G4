<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>08 · Donut</title>
<link rel="stylesheet" href="style.css?v=scale2" />
<style>
  /* Composição (light): donut conic-gradient 400px dentro de surface
     à esquerda (furo com bg do surface + número central), legenda à
     direita como 4 mini-surfaces empilhadas. Fatia protagonista gold. */

  .head{position:absolute;left:var(--pad);top:104px;max-width:1100px}
  .head .eyebrow{margin-bottom:22px}
  .head h1{font-size:60px}

  /* card do donut: 96 + 600 = 696 · 296 + 508 = 804 = 900 − 96 ✓ */
  .donut-card{position:absolute;left:var(--pad);top:296px;width:600px;height:508px;
    display:grid;place-items:center}

  /* fatias: gold 0–42% · rgba(--text-1) .16 → 70% · .10 → 89% · .06 → 100% */
  .donut{position:relative;width:400px;height:400px;border-radius:50%;
    background:conic-gradient(
      var(--gold-500) 0 42%,
      rgba(0,31,53,.16) 42% 70%,
      rgba(0,31,53,.10) 70% 89%,
      rgba(0,31,53,.06) 89% 100%)}
  /* furo: 400 − 2·68 = 264px, na cor do surface */
  .donut::after{content:'';position:absolute;inset:68px;border-radius:50%;
    background:var(--surface);box-shadow:inset 0 2px 10px rgba(0,31,53,.05)}
  .donut .center{position:absolute;inset:0;z-index:1;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:6px}
  .donut .center .num{font-size:72px;color:var(--gold)}

  /* legenda: 696 + 56 = 752 · 752 + 752 = 1504 = 1600 − 96 ✓
     4 cards de 115px + 3 gaps de 16 = 508 = altura do donut-card ✓ */
  .legend{position:absolute;left:752px;right:var(--pad);top:296px;height:508px;
    display:flex;flex-direction:column;gap:16px}
  .row{flex:1;display:flex;align-items:center;gap:20px;padding:0 34px}
  .row .swatch{width:14px;height:14px;border-radius:50%;flex:none}
  .row .what{display:flex;flex-direction:column;gap:5px}
  .row .name{font-size:22px;font-weight:500;color:var(--text-1)}
  .row .end{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:5px}
  .row .val{font-size:26px}

  .row--gold .swatch{background:var(--gold-500)}
  .row--gold .val{color:var(--gold)}
  .s2{background:rgba(0,31,53,.16)}
  .s3{background:rgba(0,31,53,.10)}
  .s4{background:rgba(0,31,53,.06);border:1px solid var(--border-2)}
</style>
</head>
<body>
<!-- copy = Lorem Ipsum calibrado ao layout · troque pelo seu conteúdo mantendo comprimentos -->
<div class="stage">
  <article class="slide" data-section="Lorem · ipsum">

    <header class="head">
      <div class="eyebrow">Lorem · ipsum 2026</div>
      <h1 class="h-serif">Lorem ipsum sit, <em>sed amet.</em></h1>
    </header>

    <section class="donut-card surface">
      <div class="donut" role="img" aria-label="Imersões respondem por 42% da receita">
        <div class="center">
          <span class="num">42%</span>
          <span class="mono-label">Lorem sit</span>
        </div>
      </div>
    </section>

    <aside class="legend">
      <div class="row surface surface--flat row--gold">
        <span class="swatch" aria-hidden="true"></span>
        <div class="what">
          <span class="name">Consectetur adipiscing</span>
          <span class="chip chip--gold"><span class="dot"></span>Elit</span>
        </div>
        <div class="end">
          <span class="num val">R$ 40,3M</span>
          <span class="mono-label">42% sit amet</span>
        </div>
      </div>
      <div class="row surface surface--flat">
        <span class="swatch s2" aria-hidden="true"></span>
        <div class="what"><span class="name">Sed tempor incididunt</span></div>
        <div class="end">
          <span class="num val">R$ 26,9M</span>
          <span class="mono-label">28% sit amet</span>
        </div>
      </div>
      <div class="row surface surface--flat">
        <span class="swatch s3" aria-hidden="true"></span>
        <div class="what"><span class="name">Magna aliqua enim</span></div>
        <div class="end">
          <span class="num val">R$ 18,2M</span>
          <span class="mono-label">19% sit amet</span>
        </div>
      </div>
      <div class="row surface surface--flat">
        <span class="swatch s4" aria-hidden="true"></span>
        <div class="what"><span class="name">Officia &amp; deserunt</span></div>
        <div class="end">
          <span class="num val">R$ 10,6M</span>
          <span class="mono-label">11% sit amet</span>
        </div>
      </div>
    </aside>

  </article>
</div>
<script>
  const slide = document.querySelector('.slide');
  function fit(){
    const s = Math.min(innerWidth / 1600, innerHeight / 900);
    slide.style.transform = `translate(-50%, -50%) scale(${s})`;
  }
  addEventListener('resize', fit); fit();
</script>
</body>
</html>
