<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>07 · Gráfico de linha</title>
<link rel="stylesheet" href="style.css?v=scale2" />
<style>
  /* Tendência (light): linha SVG suave dentro de superfície grande,
     área com gradiente gold, dots brancos com borda gold, último
     ponto com halo e valor 44px ao lado. Header serif + chip verde. */

  .head{position:absolute;left:var(--pad);right:var(--pad);top:104px;
    display:flex;align-items:flex-end;justify-content:space-between;gap:60px}
  .head .eyebrow{margin-bottom:22px}
  .head h1{font-size:62px;max-width:820px}
  .head .side{display:flex;flex-direction:column;align-items:flex-end;gap:16px;padding-bottom:8px}
  .head .read{max-width:380px;text-align:right}

  /* painel: 352 + 452 = 804 = 900 − 96 ✓ · interno 1408 − 120 = 1288 */
  .panel{position:absolute;left:var(--pad);right:var(--pad);top:352px;bottom:96px;
    padding:44px 60px 34px;display:flex;flex-direction:column}
  .panel-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}

  .chart-svg{display:block;width:1280px;height:330px}
  .grid-line{stroke:var(--border-2);stroke-width:1;stroke-dasharray:3 7}
  .axis-label{font-family:var(--mono);font-size:19px;letter-spacing:.12em;
    text-transform:uppercase;fill:var(--text-3)}
  .line{fill:none;stroke:var(--gold);stroke-width:3;stroke-linecap:round}
  .dot{fill:#FFFFFF;stroke:var(--gold);stroke-width:2.5}
  .final-val{font-family:var(--num);font-weight:600;font-size:44px;
    letter-spacing:-.03em;fill:var(--gold)}
</style>
</head>
<body>
<!-- copy = Lorem Ipsum calibrado ao layout · troque pelo seu conteúdo mantendo comprimentos -->
<div class="stage">
  <article class="slide" data-section="Lorem · ipsum">

    <header class="head">
      <div>
        <div class="eyebrow">Lorem · ipsum dolor sit amet</div>
        <h1 class="h-serif">Lorem ipsum dolor sit <em>amet consectetur.</em></h1>
      </div>
      <div class="side">
        <span class="chip chip--green"><span class="dot"></span>+56 pts lorem 6 ipsum dolor</span>
        <p class="body read">Lorem ipsum dolor sit amet, consectetur adipiscing elit sed tempor incididunt labore magna.</p>
      </div>
    </header>

    <section class="panel surface">
      <div class="panel-top">
        <span class="mono-label">% lorem ipsum dolor sit consectetur · ipsum dolor</span>
        <span class="mono-label">T1·2025 → T2·2026</span>
      </div>

      <!--
        Conversão valor → coordenada (SVG 1280 × 330):
        · eixo X — 6 pontos, x = 90 + i·204  →  90, 294, 498, 702, 906, 1110
        · eixo Y — plot de y=20 (80%) a y=280 (0%) ⇒ y = 280 − valor·3,25
            12% → 241 · 21% → 212 · 29% → 186 · 41% → 147 · 55% → 101 · 68% → 59
        · curvas C: controles horizontais a meio-passo (±102px) de cada ponto
        · gridlines: 0/20/40/60/80% → y = 280 / 215 / 150 / 85 / 20
      -->
      <svg class="chart-svg" viewBox="0 0 1280 330" aria-label="Evolução de 12% para 68% em seis trimestres">
        <defs>
          <linearGradient id="fill-gold" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="rgba(185,145,91,.22)"/>
            <stop offset="1" stop-color="rgba(185,145,91,0)"/>
          </linearGradient>
        </defs>

        <!-- gridlines horizontais + labels do eixo Y -->
        <line class="grid-line" x1="90" y1="280" x2="1110" y2="280"/>
        <line class="grid-line" x1="90" y1="215" x2="1110" y2="215"/>
        <line class="grid-line" x1="90" y1="150" x2="1110" y2="150"/>
        <line class="grid-line" x1="90" y1="85"  x2="1110" y2="85"/>
        <line class="grid-line" x1="90" y1="20"  x2="1110" y2="20"/>
        <text class="axis-label" x="70" y="284" text-anchor="end">0</text>
        <text class="axis-label" x="70" y="219" text-anchor="end">20</text>
        <text class="axis-label" x="70" y="154" text-anchor="end">40</text>
        <text class="axis-label" x="70" y="89"  text-anchor="end">60</text>
        <text class="axis-label" x="70" y="24"  text-anchor="end">80</text>

        <!-- área sob a curva -->
        <path fill="url(#fill-gold)" d="M90,241
          C192,241 192,212 294,212
          C396,212 396,186 498,186
          C600,186 600,147 702,147
          C804,147 804,101 906,101
          C1008,101 1008,59 1110,59
          L1110,280 L90,280 Z"/>

        <!-- linha -->
        <path class="line" d="M90,241
          C192,241 192,212 294,212
          C396,212 396,186 498,186
          C600,186 600,147 702,147
          C804,147 804,101 906,101
          C1008,101 1008,59 1110,59"/>

        <!-- dots -->
        <circle class="dot" cx="90"  cy="241" r="6"/>
        <circle class="dot" cx="294" cy="212" r="6"/>
        <circle class="dot" cx="498" cy="186" r="6"/>
        <circle class="dot" cx="702" cy="147" r="6"/>
        <circle class="dot" cx="906" cy="101" r="6"/>
        <!-- último ponto: halo + dot maior -->
        <circle cx="1110" cy="59" r="20" fill="rgba(185,145,91,.18)"/>
        <circle class="dot" cx="1110" cy="59" r="9"/>

        <!-- valor final ao lado do último ponto -->
        <text class="final-val" x="1142" y="74">68%</text>

        <!-- labels do eixo X -->
        <text class="axis-label" x="90"   y="314" text-anchor="middle">T1·25</text>
        <text class="axis-label" x="294"  y="314" text-anchor="middle">T2·25</text>
        <text class="axis-label" x="498"  y="314" text-anchor="middle">T3·25</text>
        <text class="axis-label" x="702"  y="314" text-anchor="middle">T4·25</text>
        <text class="axis-label" x="906"  y="314" text-anchor="middle">T1·26</text>
        <text class="axis-label" x="1110" y="314" text-anchor="middle">T2·26</text>
      </svg>
    </section>

  </article>
</div>
<script>
  const slide = document.querySelector('.slide');
  function fit(){
    const s = Math.min(innerWidth / 1600, innerHeight / 900);
    slide.style.transform = `translate(-50%, -50%) scale(${s})`;
  }
  addEventListener('resize', fit); fit();
</script>
</body>
</html>
